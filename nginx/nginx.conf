upstream docmost_backend {
    server docmost:3000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name docmost.buildnweb.in;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name docmost.buildnweb.in;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/docmost.buildnweb.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docmost.buildnweb.in/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max upload size (match DocMost's FILE_UPLOAD_SIZE_LIMIT)
    client_max_body_size 50m;

    # Proxy to DocMost app
    location / {
        proxy_pass http://docmost_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for real-time collaboration)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
